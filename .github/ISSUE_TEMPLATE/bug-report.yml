name: "🐞 Bug Report"
description: "Report a bug in the assessment agent, report generation, or tooling"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which part of the project is affected?"
      options:
        - Assessment agent (discovery/assessment phase)
        - Report generation (HTML dashboard)
        - Rule files (content/format issues)
        - Queries (KQL queries)
        - Validation script
        - GitHub Actions workflows
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: "Describe the bug clearly."
      placeholder: "The assessment agent fails to connect when multiple subscriptions are available..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Open the project in VS Code
        2. Run "Assess my Azure subscription"
        3. Agent shows error: "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened? Include error messages if any."
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: "Where are you running the assessment?"
      options:
        - VS Code (Agent mode)
        - GitHub Copilot CLI (gh copilot)
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: "Any other information (OS, VS Code version, Node.js version, etc.)"
    validations:
      required: false
