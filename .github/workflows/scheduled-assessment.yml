name: Scheduled Assessment

on:
  schedule:
    # Runs every Monday at 8:00 AM UTC — adjust to your needs
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      subscription_ids:
        description: 'Comma-separated Azure Subscription IDs (overrides secret). Leave empty to use AZURE_SUBSCRIPTION_IDS secret.'
        required: false
        type: string
      profile:
        description: 'Environment profile'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - startup
          - scaleup
          - enterprise
      severity_filter:
        description: 'Create issues for these severity levels'
        required: false
        type: string
        default: 'Critical High'
      create_issues:
        description: 'Auto-create GitHub Issues for findings'
        required: false
        type: boolean
        default: true

jobs:
  assess:
    name: Run Assessment
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve subscription list
        id: subs
        run: |
          # Support: single sub (AZURE_SUBSCRIPTION_ID), multi-sub (AZURE_SUBSCRIPTION_IDS), or workflow input
          RAW="${{ inputs.subscription_ids || secrets.AZURE_SUBSCRIPTION_IDS || secrets.AZURE_SUBSCRIPTION_ID }}"
          if [ -z "$RAW" ]; then
            echo "::error::No subscription IDs provided. Set AZURE_SUBSCRIPTION_ID or AZURE_SUBSCRIPTION_IDS secret, or provide via workflow_dispatch input."
            exit 1
          fi

          # Normalize: trim spaces, replace newlines with commas
          SUBS=$(echo "$RAW" | tr '\n' ',' | sed 's/,,*/,/g' | sed 's/^,//;s/,$//')
          echo "subscription_list=$SUBS" >> $GITHUB_OUTPUT

          # Count and validate each subscription
          IFS=',' read -ra SUB_ARRAY <<< "$SUBS"
          echo "subscription_count=${#SUB_ARRAY[@]}" >> $GITHUB_OUTPUT
          echo "## Subscriptions to assess: ${#SUB_ARRAY[@]}" >> $GITHUB_STEP_SUMMARY
          for SUB in "${SUB_ARRAY[@]}"; do
            SUB=$(echo "$SUB" | xargs)  # trim whitespace
            echo "Validating $SUB..."
            az account show --subscription "$SUB" -o table || {
              echo "::warning::Cannot access subscription $SUB — skipping"
            }
          done

      - name: Assess each subscription
        id: assess
        env:
          TIMESTAMP: ${{ github.run_id }}
        run: |
          TIMESTAMP=$(date +%Y-%m-%d)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_ENV
          SUBS="${{ steps.subs.outputs.subscription_list }}"
          IFS=',' read -ra SUB_ARRAY <<< "$SUBS"

          BASELINE_PATHS=""
          TOTAL_FINDINGS=0
          TOTAL_RESOURCES=0
          SUB_SUMMARIES=""

          for SUB_ID in "${SUB_ARRAY[@]}"; do
            SUB_ID=$(echo "$SUB_ID" | xargs)
            echo "========================================="
            echo "Assessing subscription: $SUB_ID"
            echo "========================================="

            # Get subscription display name
            SUB_NAME=$(az account show --subscription "$SUB_ID" --query "name" -o tsv 2>/dev/null || echo "$SUB_ID")
            SUB_SLUG=$(echo "$SUB_NAME" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')

            # Resource inventory
            echo "Running resource inventory query..."
            az graph query -q "
              resources
              | where subscriptionId == '$SUB_ID'
              | summarize count() by type, location
              | order by count_ desc
            " --subscriptions "$SUB_ID" -o json > /tmp/inventory-${SUB_SLUG}.json

            # Security posture
            echo "Checking Defender for Cloud..."
            az graph query -q "
              securityresources
              | where type == 'microsoft.security/securescores'
              | where subscriptionId == '$SUB_ID'
              | project name, current=properties.score.current, max=properties.score.max
            " --subscriptions "$SUB_ID" -o json > /tmp/security-${SUB_SLUG}.json || true

            # Policy compliance
            echo "Checking policy compliance..."
            az graph query -q "
              policyresources
              | where type == 'microsoft.policyinsights/policystates'
              | where subscriptionId == '$SUB_ID'
              | where properties.complianceState == 'NonCompliant'
              | summarize count() by tostring(properties.policyDefinitionName)
            " --subscriptions "$SUB_ID" -o json > /tmp/compliance-${SUB_SLUG}.json || true

            # Build baseline for this subscription
            python3 - <<PYTHON
          import json, os, re
          from datetime import datetime

          sub_id = "$SUB_ID"
          sub_name = "$SUB_NAME"
          sub_slug = "$SUB_SLUG"
          timestamp = "$TIMESTAMP"

          def load_json(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except: return {}

          inventory = load_json(f"/tmp/inventory-{sub_slug}.json")
          security = load_json(f"/tmp/security-{sub_slug}.json")
          compliance = load_json(f"/tmp/compliance-{sub_slug}.json")

          resources = inventory.get("data", [])
          total_resources = sum(r.get("count_", 0) for r in resources)
          regions = list(set(r.get("location", "unknown") for r in resources))

          # Load rules
          all_rules = []
          for root, dirs, files in os.walk("rules"):
              for f in files:
                  if f.endswith(".md"):
                      with open(os.path.join(root, f)) as fh:
                          content = fh.read()
                      for m in re.finditer(r'\*\*Rule ID:\*\*\s*((?:SEC|REL|COST|OPS|PERF|GOV)-\d{3})', content):
                          all_rules.append(m.group(1))

          non_compliant = compliance.get("data", [])

          baseline = {
              "metadata": {
                  "subscription_id": sub_id,
                  "subscription_name": sub_name,
                  "date": timestamp,
                  "total_resources": total_resources,
                  "regions": regions,
                  "profile": "${{ inputs.profile || 'auto' }}",
                  "generated_by": "github-actions"
              },
              "summary": {
                  "total_rules": len(all_rules),
                  "total_resources": total_resources,
                  "non_compliant_policies": len(non_compliant)
              },
              "findings": [],
              "passed": [],
              "discovery": {
                  "inventory": resources[:20],
                  "security": security.get("data", []),
                  "non_compliant_policies": non_compliant[:20]
              }
          }

          os.makedirs("baselines", exist_ok=True)
          outpath = f"baselines/baseline-{sub_slug}-{timestamp}.json"
          with open(outpath, "w") as f:
              json.dump(baseline, f, indent=2)

          print(f"Baseline: {outpath} | Resources: {total_resources} | Regions: {len(regions)}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"baseline_{sub_slug}={outpath}\n")
          PYTHON

            BASELINE_PATH="baselines/baseline-${SUB_SLUG}-${TIMESTAMP}.json"
            BASELINE_PATHS="${BASELINE_PATHS} ${BASELINE_PATH}"
            SUB_SUMMARIES="${SUB_SUMMARIES}\n| \`${SUB_ID}\` | ${SUB_NAME} | ${BASELINE_PATH} |"
          done

          echo "baseline_paths=$BASELINE_PATHS" >> $GITHUB_ENV
          echo "sub_summaries<<EOF" >> $GITHUB_ENV
          echo -e "$SUB_SUMMARIES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Drift detection (compare with previous baselines)
        id: drift
        run: |
          DRIFT_FOUND=false
          for CURRENT in ${{ env.baseline_paths }}; do
            # Extract subscription slug from filename
            SLUG=$(echo "$CURRENT" | sed 's|baselines/baseline-||;s|-[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\.json||')
            # Find the previous baseline for the same subscription
            PREVIOUS=$(ls -t baselines/baseline-${SLUG}-*.json 2>/dev/null | grep -v "$CURRENT" | head -1)
            if [ -n "$PREVIOUS" ]; then
              echo "Drift check: $CURRENT vs $PREVIOUS"
              python3 scripts/compare-assessments.py \
                --baseline "$PREVIOUS" \
                --current "$CURRENT" || DRIFT_FOUND=true
            fi
          done
          echo "drift_detected=$DRIFT_FOUND" >> $GITHUB_OUTPUT

      - name: Generate trend dashboard
        if: always()
        run: |
          if [ -f scripts/generate-trend-dashboard.py ]; then
            python3 scripts/generate-trend-dashboard.py \
              --baselines-dir baselines/ \
              --output trend-dashboard.html || true
          fi

      - name: Generate score badge
        if: always()
        run: |
          if [ -f scripts/generate-badge.py ]; then
            python3 scripts/generate-badge.py \
              --baselines-dir baselines/ \
              --output badge/score.json || true
          fi

      - name: Create issues from findings
        if: inputs.create_issues == true || inputs.create_issues == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SEVERITY="${{ inputs.severity_filter || 'Critical High' }}"
          MILESTONE="Assessment ${{ env.timestamp }}"

          for REPORT in assessment-*.html; do
            [ -f "$REPORT" ] || continue
            echo "Creating issues from $REPORT (severity: $SEVERITY)"
            python3 scripts/create-issues-from-report.py \
              --report "$REPORT" \
              --severity $SEVERITY \
              --milestone "$MILESTONE" || true
          done

      - name: Commit baseline, dashboard, and badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/ trend-dashboard.html badge/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: save assessment baselines ${{ env.timestamp }}

          Automated assessment run (${{ steps.subs.outputs.subscription_count }} subscriptions)."
          git push || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assessment-${{ env.timestamp }}-${{ github.run_number }}
          path: |
            assessment-*.html
            baselines/baseline-*-${{ env.timestamp }}.json
            trend-dashboard.html
            badge/
          retention-days: 90

      - name: Post summary
        if: always()
        run: |
          echo "## 📊 Assessment Summary — ${{ env.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Subscription ID | Name | Baseline |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo -e "${{ env.sub_summaries }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Subscriptions assessed | ${{ steps.subs.outputs.subscription_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drift detected | ${{ steps.drift.outputs.drift_detected }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 [Download artifacts](../actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
