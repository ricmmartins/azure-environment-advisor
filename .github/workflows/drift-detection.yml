name: Drift Detection

on:
  # Runs after the scheduled assessment completes
  workflow_run:
    workflows: ["Scheduled Assessment"]
    types: [completed]
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Path to previous baseline (e.g., baselines/baseline-2026-03-01.json)'
        required: true
        type: string
      current:
        description: 'Path to current baseline (e.g., baselines/baseline-2026-03-31.json)'
        required: true
        type: string

jobs:
  detect-drift:
    name: Compare Baselines
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine baselines
        id: baselines
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "baseline=${{ inputs.baseline }}" >> $GITHUB_OUTPUT
            echo "current=${{ inputs.current }}" >> $GITHUB_OUTPUT
          else
            # Auto-detect: find the two most recent baselines
            BASELINES=$(ls -t baselines/baseline-*.json 2>/dev/null)
            COUNT=$(echo "$BASELINES" | grep -c . || true)

            if [ "$COUNT" -lt 2 ]; then
              echo "::notice::Less than 2 baselines found. Skipping drift detection."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            CURRENT=$(echo "$BASELINES" | head -1)
            PREVIOUS=$(echo "$BASELINES" | sed -n '2p')
            echo "baseline=$PREVIOUS" >> $GITHUB_OUTPUT
            echo "current=$CURRENT" >> $GITHUB_OUTPUT
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run drift detection
        if: steps.baselines.outputs.skip != 'true'
        id: drift
        run: |
          python3 scripts/compare-assessments.py \
            --baseline "${{ steps.baselines.outputs.baseline }}" \
            --current "${{ steps.baselines.outputs.current }}" \
            --output json > /tmp/drift-report.json 2>&1 || true

          # Parse results for summary
          python3 - <<'PYTHON'
          import json, os
          try:
              with open("/tmp/drift-report.json") as f:
                  data = json.load(f)
              new_count = len(data.get("new_findings", []))
              resolved_count = len(data.get("resolved_findings", []))
              escalated_count = len(data.get("escalated", []))

              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"new_findings={new_count}\n")
                  f.write(f"resolved_findings={resolved_count}\n")
                  f.write(f"escalated={escalated_count}\n")
                  f.write(f"has_regressions={'true' if new_count > 0 or escalated_count > 0 else 'false'}\n")

              print(f"New: {new_count}, Resolved: {resolved_count}, Escalated: {escalated_count}")
          except Exception as e:
              print(f"Could not parse drift report: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("new_findings=0\nresolved_findings=0\nescalated=0\nhas_regressions=false\n")
          PYTHON

      - name: Create issue for regressions
        if: steps.drift.outputs.has_regressions == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASELINE="${{ steps.baselines.outputs.baseline }}"
          CURRENT="${{ steps.baselines.outputs.current }}"
          NEW="${{ steps.drift.outputs.new_findings }}"
          ESCALATED="${{ steps.drift.outputs.escalated }}"
          RESOLVED="${{ steps.drift.outputs.resolved_findings }}"

          BODY="## Governance Drift Detected

          | Metric | Count |
          |--------|-------|
          | 🆕 New findings | $NEW |
          | ⬆️ Escalated | $ESCALATED |
          | ✅ Resolved | $RESOLVED |

          **Compared:** \`$BASELINE\` → \`$CURRENT\`

          ### Action Required
          Review the new and escalated findings. Run the full comparison locally:
          \`\`\`bash
          python scripts/compare-assessments.py --baseline $BASELINE --current $CURRENT
          \`\`\`

          ---
          _Auto-generated by Azure Environment Advisor drift detection workflow._"

          gh issue create \
            --title "⚠️ Governance Drift: $NEW new findings, $ESCALATED escalated" \
            --body "$BODY" \
            --label "assessment-finding,drift-detected" || true

      - name: Post summary
        if: steps.baselines.outputs.skip != 'true'
        run: |
          echo "## 🔄 Drift Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🆕 New findings | ${{ steps.drift.outputs.new_findings }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⬆️ Escalated | ${{ steps.drift.outputs.escalated }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Resolved | ${{ steps.drift.outputs.resolved_findings }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Baselines:** \`${{ steps.baselines.outputs.baseline }}\` → \`${{ steps.baselines.outputs.current }}\`" >> $GITHUB_STEP_SUMMARY
